<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DigiSlip — Your Receipt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d0d0d;
      --surface: #161616;
      --border:  #2a2a2a;
      --accent:  #b6ff6a;
      --accent2: #6affdb;
      --fg:      #e8e8e8;
      --muted:   #5a5a5a;
      --error:   #ff6a6a;
      --receipt: #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .header { text-align: center; margin-bottom: 32px; }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 36px;
      letter-spacing: -1px;
      color: var(--accent);
      line-height: 1;
      text-decoration: none;
    }

    .logo span { color: var(--accent2); }

    .tagline {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    .card-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-body { padding: 20px; }

    .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .spinner {
      display: block;
      width: 28px; height: 28px;
      margin: 16px auto 0;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state { text-align: center; padding: 40px 20px; }
    .error-icon  { font-size: 32px; margin-bottom: 12px; }
    .error-msg   { color: var(--error); font-size: 14px; line-height: 1.6; }
    .error-sub   { color: var(--muted); font-size: 12px; margin-top: 8px; }

    .receipt-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .badge {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: rgba(182,255,106,0.1);
      color: var(--accent);
      border: 1px solid rgba(182,255,106,0.3);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .receipt-date { font-size: 11px; color: var(--muted); }

    .receipt-body {
      background: var(--receipt);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      line-height: 1.9;
      white-space: pre-wrap;
      word-break: break-word;
      color: #c8d8b0;
      max-height: 60vh;
      overflow-y: auto;
    }

    .receipt-body::-webkit-scrollbar { width: 4px; }
    .receipt-body::-webkit-scrollbar-track { background: transparent; }
    .receipt-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .footer { margin-top: 24px; text-align: center; font-size: 11px; color: var(--muted); }
    .footer a { color: var(--accent2); text-decoration: none; }
  </style>
</head>
<body>

  <div class="header">
    <a href="/" class="logo">digi<span>slip</span></a>
    <div class="tagline">Digital receipt</div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="dot" id="statusDot"></div>
      <span class="card-label" id="cardLabel">Loading slip...</span>
    </div>
    <div class="card-body" id="cardBody">
      <div class="loading">
        Fetching your receipt
        <span class="spinner"></span>
      </div>
    </div>
  </div>

  <div class="footer">
    Go paperless with <a href="/">DigiSlip</a>
  </div>

  <script>
    var SUPABASE_URL  = "https://eivctqjisodfhaitzyiq.supabase.co";
    var SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdmN0cWppc29kZmhhaXR6eWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDgxMjIsImV4cCI6MjA5MjM4NDEyMn0._0wu91Zrc3aMrKsO_KUkp64CoOCklwMViYAofYZyCFI";

    function getSlipId() {
      // Path-based: /slip/<uuid>
      var parts  = window.location.pathname.split("/").filter(Boolean);
      var uuidRe = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      for (var i = parts.length - 1; i >= 0; i--) {
        if (uuidRe.test(parts[i])) return parts[i];
      }
      // Query param fallback: ?id=<uuid>
      var params = new URLSearchParams(window.location.search);
      return params.get("id") || params.get("slip") || null;
    }

    var dot   = document.getElementById("statusDot");
    var label = document.getElementById("cardLabel");
    var body  = document.getElementById("cardBody");

    function showError(icon, msg, sub) {
      dot.style.background = "var(--error)";
      dot.style.boxShadow  = "0 0 8px var(--error)";
      label.textContent    = "Could not load slip";
      body.innerHTML =
        '<div class="error-state">' +
          '<div class="error-icon">' + icon + '</div>' +
          '<div class="error-msg">'  + msg  + '</div>' +
          (sub ? '<div class="error-sub">' + sub + '</div>' : '') +
        '</div>';
    }

    var slipId = getSlipId();

    if (!slipId) {
      showError("!", "No slip ID found in this URL.", "Make sure you scanned the correct QR code.");
    } else {
      fetch(
        SUPABASE_URL + "/rest/v1/slips?id=eq." + slipId + "&select=raw_text,created_at,merchant_id,device_id",
        { headers: { "apikey": SUPABASE_ANON, "Authorization": "Bearer " + SUPABASE_ANON } }
      )
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data || data.length === 0) {
          showError("?", "Slip not found.", "It may have expired or the link may be incorrect.");
          return;
        }

        var slip      = data[0];
        var createdAt = new Date(slip.created_at);
        var ageHours  = (Date.now() - createdAt) / 3600000;

        if (ageHours > 24) {
          showError("!", "This slip has expired.", "Slips are available for 24 hours after the transaction.");
          return;
        }

        var text = (slip.raw_text || "(No receipt text)")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

        var date = createdAt.toLocaleString("en-ZA", { dateStyle: "medium", timeStyle: "short" });

        label.textContent = "Your receipt";
        body.innerHTML =
          '<div class="receipt-meta">' +
            '<span class="badge">Verified</span>' +
            '<span class="receipt-date">' + date + '</span>' +
          '</div>' +
          '<div class="receipt-body">' + text + '</div>';
      })
      .catch(function(err) {
        showError("!", "Could not connect to DigiSlip servers.", err.message);
      });
    }
  </script>
</body>
</html>
